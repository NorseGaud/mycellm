# Lint and test on push/PR. Fast path: unit, integration, and harness smoke tests.
# Full multi-node E2E (spawns real `mycellm serve` on localhost) runs after that succeeds.
name: Lint and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and dev tools
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check src tests

      - name: Pytest (unit, integration, harness smoke)
        run: >
          pytest tests/unit tests/integration tests/e2e/test_harness.py
          -q --tb=short

  e2e:
    needs: lint-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and dev tools
        run: pip install -e ".[dev]"

      - name: Pytest (multi-node E2E)
        run: pytest tests/e2e/test_three_nodes.py -v --tb=short
