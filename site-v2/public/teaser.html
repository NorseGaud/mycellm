<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/brand/mycellm-red-logo-sans.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/brand/favicon-32.png">
    <title>mycellm — The distributed LLM inference network.</title>
    <script defer src="https://analytics.zetaix.com/script.js" data-website-id="e70ee1fc-d684-497f-9f64-aa0dc624d74a"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        mycelium: {
                            50: '#f0fdf4',
                            500: '#22c55e',
                            glow: '#4ade80',
                            dark: '#052e16',
                            bg: '#0a0a0a'
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'blink': 'blink 1s step-end infinite',
                    },
                    keyframes: {
                        blink: {
                            '0%, 100%': { opacity: '1' },
                            '50%': { opacity: '0' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0a0a0a;
            color: #e5e5e5;
            overflow-x: hidden;
        }
        .text-glow {
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.5), 0 0 20px rgba(74, 222, 128, 0.3);
        }
        .ascii-art {
            line-height: 1.1;
            white-space: pre;
            background: linear-gradient(180deg, #4ade80 0%, #22c55e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 0px 8px rgba(34, 197, 94, 0.6));
        }
        .glass-panel {
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(34, 197, 94, 0.1);
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(34, 197, 94, 0.2); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col antialiased selection:bg-mycelium-500 selection:text-black">

    <canvas id="networkCanvas" class="fixed inset-0 z-0 opacity-40"></canvas>

    <main class="relative z-10 flex-grow flex flex-col items-center justify-center p-6 min-h-screen">
        <div class="max-w-3xl w-full flex flex-col items-center text-center space-y-8 mt-12 md:mt-0">

            <div class="mb-4 cursor-default group" title="mycellm daemon starting...">
                <div id="mushroom-container" class="relative w-24 h-24 md:w-32 md:h-32 mx-auto group-hover:scale-110 transition-all duration-500">
                    <img id="mushroom-svg" src="/brand/mycellm-blue-logo-sans.svg" alt="mycellm"
                         class="w-full h-full transition-opacity duration-700"
                         style="filter: drop-shadow(rgba(59, 130, 246, 0.7) 0px 0px 16px); opacity: 1;">
                </div>
            </div>

            <div class="space-y-4">
                <img src="/brand/mycellm-logotype-R.svg" alt="mycellm" class="h-12 md:h-16 mx-auto"
                     style="filter: drop-shadow(0px 0px 8px rgba(74, 222, 128, 0.3));">
                <p class="font-mono text-sm md:text-base text-gray-400 uppercase tracking-[0.2em]">
                    /my·SELL·em/ — mycelium + LLM
                </p>
                <div class="pt-8">
                    <span class="font-mono text-xs md:text-sm text-mycelium-500 uppercase tracking-widest animate-pulse border border-mycelium-500/30 bg-mycelium-500/10 px-4 py-2 rounded">
                        Status: Booting Up Protocol...
                    </span>
                </div>
            </div>

            <div class="w-full max-w-2xl mt-8 text-left font-mono text-xs text-gray-500 h-32 overflow-hidden relative" id="terminalLog">
                <div class="absolute bottom-0 w-full bg-gradient-to-t from-[#0a0a0a] to-transparent h-12 z-10 pointer-events-none"></div>
                <div id="logContent" class="flex flex-col-reverse justify-end pb-4 space-y-1 space-y-reverse"></div>
            </div>

        </div>
    </main>

    <script>
        const logs = [
            "[INFO] Initializing root substrate...",
            "[INFO] Generating local cryptographic identity...",
            "[WARN] Latent spores detected. Awaiting synchronization...",
            "[INFO] Binding p2p host to local environment...",
            "[INFO] Executing secure handshake protocols...",
            "[INFO] Connecting to decentralized relay gateways...",
            "[INFO] Distributed hash table bootstrap complete. Discovered 42 active peers.",
            "[INFO] Role updated: NODE. Awaiting tier assignment.",
            "[INFO] Mapping swarm topology...",
            "[INFO] Allocating system resources. Layer assignment pending.",
            "[INFO] Validating consensus against oracle...",
            "[WARN] Centralized monolithic structures detected. Routing around damage...",
            "[INFO] Boot sequence paused. Awaiting genesis network launch..."
        ];

        const logContent = document.getElementById('logContent');
        let logIndex = 0;

        function generateHash() {
            return Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
        }

        function setMushroomTheme(theme) {
            const img = document.getElementById('mushroom-svg');
            if (!img) return;
            const themes = {
                red:    { file: 'mycellm-red-logo-sans.svg',    shadow: 'rgba(239, 68, 68, 0.7)' },
                green:  { file: 'mycellm-green-logo-sans.svg',  shadow: 'rgba(34, 197, 94, 0.7)' },
                blue:   { file: 'mycellm-blue-logo-sans.svg',   shadow: 'rgba(59, 130, 246, 0.7)' },
                gold:   { file: 'mycellm-gold-logo-sans.svg',   shadow: 'rgba(250, 204, 21, 0.7)' },
                purple: { file: 'mycellm-purple-logo-sans.svg', shadow: 'rgba(168, 85, 247, 0.7)' },
            };
            const t = themes[theme] || themes.red;
            img.style.opacity = '0.5';
            setTimeout(() => {
                img.src = `/brand/${t.file}`;
                img.style.filter = `drop-shadow(0px 0px 16px ${t.shadow})`;
                img.style.opacity = '1';
            }, 350);
        }

        function addLog(text) {
            const div = document.createElement('div');
            const timestamp = new Date().toISOString().split('T')[1].substring(0,8);
            const lowerText = text.toLowerCase();
            if (lowerText.includes('warn') || lowerText.includes('damage') || lowerText.includes('latent') || lowerText.includes('oracle')) {
                setMushroomTheme('purple');
            } else if (lowerText.includes('tier') || lowerText.includes('consensus') || lowerText.includes('earned')) {
                setMushroomTheme('gold');
            } else if (lowerText.includes('node') || lowerText.includes('resources') || lowerText.includes('layer') || lowerText.includes('allocating')) {
                setMushroomTheme('red');
            } else if (lowerText.includes('relay') || lowerText.includes('topology') || lowerText.includes('dht') || lowerText.includes('peer') || lowerText.includes('p2p')) {
                setMushroomTheme('blue');
            } else if (lowerText.includes('substrate') || lowerText.includes('client')) {
                setMushroomTheme('green');
            }
            div.innerHTML = `<span class="opacity-50">${timestamp}</span> <span class="text-mycelium-500">></span> ${text}`;
            logContent.prepend(div);
            if (logContent.children.length > 10) logContent.removeChild(logContent.lastChild);
        }

        function processLogs() {
            if (logIndex < logs.length) {
                addLog(logs[logIndex]);
                logIndex++;
                setTimeout(processLogs, Math.random() * 1500 + 500);
            } else {
                setTimeout(() => {
                    const ambientLogs = [
                        `[DEBUG] Protocol standby. Listening for new peer connections...`,
                        `[INFO] Swarm heartbeat acknowledged.`,
                        `[DEBUG] Gossip protocol: verifying peer ${generateHash().substring(0,8)}`,
                        `[INFO] Awaiting genesis network launch...`
                    ];
                    addLog(ambientLogs[Math.floor(Math.random() * ambientLogs.length)]);
                    processLogs();
                }, Math.random() * 5000 + 3000);
            }
        }
        setTimeout(processLogs, 1000);

        const canvas = document.getElementById('networkCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        const connectionDistance = 150;
        const particleCount = Math.min(window.innerWidth / 15, 100);

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.radius = Math.random() * 1.5 + 0.5;
                this.phase = Math.random() * Math.PI * 2;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
                this.phase += 0.02;
            }
            draw() {
                const r = this.radius + Math.sin(this.phase) * 0.5;
                const a = 0.5 + Math.sin(this.phase) * 0.3;
                ctx.beginPath();
                ctx.arc(this.x, this.y, Math.max(0.1, r), 0, Math.PI * 2);
                ctx.fillStyle = `rgba(34, 197, 94, ${a})`;
                ctx.fill();
            }
        }

        function initParticles() {
            for (let i = 0; i < particleCount; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update(); particles[i].draw();
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const d = Math.sqrt(dx * dx + dy * dy);
                    if (d < connectionDistance) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(74, 222, 128, ${(1 - d / connectionDistance) * 0.25})`;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        initParticles();
        animate();
    </script>
</body></html>
